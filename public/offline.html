<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#00D46A" />
    <title>FantasyX Offline</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0d1117;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      }
      main {
        max-width: 420px;
        padding: 24px;
        text-align: center;
      }
      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: #00d46a;
        color: #0d1117;
        font-weight: 900;
        letter-spacing: -0.08em;
        box-shadow: 0 0 40px rgba(0, 212, 106, 0.28);
      }
      h1 { margin: 0 0 8px; font-size: 22px; }
      p { margin: 0; color: #94a3b8; line-height: 1.55; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">FX</div>
      <h1>FantasyX is offline</h1>
      <p>Your app shell is cached. Reconnect to refresh live games, market prices, portfolio, and alerts.</p>
    </main>
  </body>
</html>
